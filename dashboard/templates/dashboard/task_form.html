<!DOCTYPE html>
<html>
<head>
    <title>Create Task</title>

    <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
            padding:40px;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            width:500px;
            margin:auto;
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        input, textarea, select{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:20px;
        }

        button{
            background:green;
            color:white;
            border:none;
            padding:12px 20px;
            cursor:pointer;
            width:100%;
        }

        button:hover{
            background:darkgreen;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>Create Task</h1>

    <form method="POST">
        {% csrf_token %}

        <label>Task Title</label>
        <input type="text" name="title" required>

        <label>Description</label>
        <textarea name="description" rows="5" required></textarea>

        <label>Select Worker</label>
        <select name="worker" required>

            {% for worker in workers %}
                <option value="{{ worker.id }}">
                    {{ worker.username }}
                </option>
            {% endfor %}

        </select>

        <button type="submit">
            Create Task
        </button>

    </form>

</div>

</body>
</html>
