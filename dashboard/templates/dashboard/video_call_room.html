{% extends 'base.html' %} 

{% block content %}
<style>
    :root {
        --cyber-emerald-dark: #022c22;
        --cyber-emerald-mid: #064e3b;
        --solid-gold: #d4af37;
    }
    body { background-color: #022c22; color: #e2e8f0; font-family: 'Inter', sans-serif; }
    .forum-navbar { background: linear-gradient(90deg, var(--cyber-emerald-mid), var(--cyber-emerald-dark)); border-bottom: 2px solid var(--solid-gold); padding: 1rem 2rem; }
    
    /* Container to hold the massive 30+ person grid */
    #jitsi-container {
        width: 100%;
        height: 80vh; 
        background-color: #000;
        border: 2px solid rgba(212, 175, 55, 0.5); /* Gold border */
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
    }
</style>

<div class="admin-container" style="padding: 2rem; min-height: 100vh;">

    <header class="forum-navbar flex justify-between items-center mb-6 rounded-lg">
        <div class="flex items-center space-x-3">
            <i class="fa-solid fa-satellite-dish text-amber-400 text-xl animate-pulse"></i>
            <h1 class="text-xl font-bold uppercase tracking-wider text-white">Global Comms: Room {{ room_name }}</h1>
        </div>
        <div class="flex items-center space-x-4">
            <a href="{% url 'dashboard:admin_dashboard' %}" class="text-amber-400 hover:text-white font-mono text-sm transition"><< Disconnect & Return</a>
        </div>
    </header>

    <div id="jitsi-container"></div>

</div>

<script src="https://meet.jit.si/external_api.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const domain = 'meet.jit.si';
        
        // We add "Divine_" to the room name so it stays unique on Jitsi's public servers
        const options = {
            roomName: 'Divine_Terminal_Room_{{ room_name }}',
            width: '100%',
            height: '100%',
            parentNode: document.querySelector('#jitsi-container'),
            userInfo: {
                // Automatically pulls the Django user's name so they don't have to type it!
                displayName: '{{ request.user.username }}'
            },
            configOverwrite: {
                // Start with mics and cameras off to prevent 30-person echo chambers upon entry
                startWithAudioMuted: true,
                startWithVideoMuted: true,
                prejoinPageEnabled: false, // Skips the boring entry screen, drops them right in
            },
            interfaceConfigOverwrite: {
                // Hides Jitsi branding to make it look like YOUR custom software
                SHOW_JITSI_WATERMARK: false,
                SHOW_WATERMARK_FOR_GUESTS: false,
                DEFAULT_BACKGROUND: '#022c22' // Matches your Cyber Emerald theme
            }
        };

        // Boot up the room
        const api = new JitsiMeetExternalAPI(domain, options);
    });
</script>
{% endblock %}
