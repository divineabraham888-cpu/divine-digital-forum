{% extends 'main_base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-sm p-4">

        <h2 class="mb-4">
            💡 Submit a Suggestion
        </h2>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit"
                    class="btn btn-primary">
                Submit Suggestion
            </button>

        </form>

    </div>

</div>

{% endblock %}
