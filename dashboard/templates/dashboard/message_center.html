{% extends 'dashboard/template.html' %}
{% block content %}

<div class="divine-message-container d-flex" style="height: 100vh; background-color: #011C10;">
    <!-- SIDEBAR: CHAT LIST -->
    <nav class="bg-dark border-end border-warning p-3 d-flex flex-column" style="width: 300px;">
        <h4 class="text-warning mb-4 fw-bold">📨 MESSAGE CENTER</h4>
        <div class="list-group list-group-flush" id="chat-list">
            <button class="list-group-item bg-transparent text-warning border-warning" onclick="switchChat('General_HQ')">🌐 General HQ (All)</button>
            <button class="list-group-item bg-transparent text-warning border-warning" onclick="switchChat('Admin_Chat')">🛡️ Admin Suite</button>
            <hr class="text-warning">
            <h6 class="text-warning small mt-2">DIRECT MESSAGES</h6>
            {% for contact in contacts %}
            <button class="list-group-item bg-transparent text-white border-secondary" onclick="switchChat('{{ contact.username }}')">👤 {{ contact.username }}</button>
            {% endfor %}
        </div>
        <div class="mt-auto">
            <a href="{% url 'dashboard:p2p_hub' %}" class="btn btn-outline-warning w-100">⬅ Back to P2P Hub</a>
        </div>
    </nav>

    <!-- MAIN CHAT AREA -->
    <main class="flex-grow-1 d-flex flex-column" style="background-color: #00361C;">
        <header class="p-3 border-bottom border-warning d-flex justify-content-between align-items-center">
            <h5 id="active-chat-title" class="text-warning mb-0">Select a chat to begin</h5>
            <span class="badge bg-warning text-dark">SECURE CONNECTION</span>
        </header>

        <div id="message-display" class="flex-grow-1 p-4 overflow-auto text-white">
            <!-- Messages appear here -->
        </div>

        <div class="p-3 border-top border-warning bg-dark">
            <div class="input-group">
                <input type="text" id="msg-input" class="form-control bg-dark text-white border-warning" placeholder="Type command/message...">
                <button class="btn btn-warning fw-bold" onclick="sendMessage()">SEND</button>
            </div>
        </div>
    </main>
</div>

<style>
    .divine-message-container { height: 100vh; }
    #message-display { display: flex; flex-direction: column; gap: 10px; }
    .msg-bubble { background: #011C10; padding: 10px; border-radius: 10px; border: 1px solid #FFD700; max-width: 70%; }
</style>

<script>
    let currentChat = null;

    // Load messages from LocalStorage so they never disappear
    function switchChat(chatId) {
        currentChat = chatId;
        document.getElementById('active-chat-title').innerText = chatId;
        document.getElementById('message-display').innerHTML = ''; // Clear view
        
        const history = JSON.parse(localStorage.getItem('msg_' + chatId) || '[]');
        history.forEach(m => appendToScreen(m.sender, m.text));
    }

    function appendToScreen(sender, text) {
        const display = document.getElementById('message-display');
        const div = document.createElement('div');
        div.className = 'msg-bubble';
        div.innerHTML = `<strong>${sender}:</strong> ${text}`;
        display.appendChild(div);
        display.scrollTop = display.scrollHeight;
    }

    function sendMessage() {
        if(!currentChat) return alert("Select a chat first!");
        const input = document.getElementById('msg-input');
        const text = input.value;
        if(!text) return;

        // Save
        let history = JSON.parse(localStorage.getItem('msg_' + currentChat) || '[]');
        history.push({sender: 'You', text: text});
        localStorage.setItem('msg_' + currentChat, JSON.stringify(history));

        // Display
        appendToScreen('You', text);
        input.value = '';
    }
</script>
{% endblock %}
