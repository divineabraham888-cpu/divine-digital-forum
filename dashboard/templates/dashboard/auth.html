{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Divine Digital Forum</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables for our Green & Gold Theme */
        :root {
            --deep-green: #022c22; /* Very dark luxurious green */
            --forest-green: #064e3b; /* Vibrant dark green */
            --gold-main: #F59E0B; /* Rich beautiful gold */
            --gold-light: #FBBF24; /* Lighter gold for hover */
            --gold-glow: rgba(245, 158, 11, 0.4);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Deep Green Gradient overlay + Your Image */
            background: linear-gradient(rgba(2, 44, 34, 0.85), rgba(6, 78, 59, 0.85)), 
                        url("{% static 'dashboard/images/background.jpg' %}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        .page-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            z-index: 1;
            padding: 20px;
            box-sizing: border-box;
        }

        /* ----- THE BRAND HEADER ----- */
        .brand-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .brand-header h1 {
            color: var(--gold-main);
            font-size: 52px;
            font-weight: 900;
            margin: 0 0 10px 0;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.6);
        }

        .brand-header .subtitle {
            color: #ffffff;
            font-size: 20px;
            font-weight: 400;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .brand-header .winning-team {
            color: var(--gold-light);
            font-size: 18px;
            font-weight: 600;
            margin: 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        /* Decorative lines around the winning team text */
        .brand-header .winning-team::before,
        .brand-header .winning-team::after {
            content: "";
            display: block;
            width: 50px;
            height: 2px;
            background-color: var(--gold-light);
            opacity: 0.5;
        }

        /* ----- THE LOGIN/SIGNUP BOX ----- */
        .auth-container {
            display: flex;
            gap: 40px;
            background: rgba(255, 255, 255, 0.97);
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
            max-width: 900px;
            width: 100%;
            box-sizing: border-box;
        }

        .auth-section { flex: 1; }

        h2 { 
            color: var(--forest-green); 
            margin-top: 0;
            margin-bottom: 25px; 
            font-weight: 800;
            font-size: 28px;
        }

        /* Form Inputs */
        input {
            width: 100%;
            padding: 16px;
            margin: 10px 0 20px 0;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            box-sizing: border-box;
            background: #f9fafb;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--gold-main);
            box-shadow: 0 0 0 4px var(--gold-glow);
            background: #ffffff;
        }

        /* Label styling (If Django renders them) */
        label {
            font-weight: 600;
            color: #374151;
            font-size: 14px;
        }

        /* Premium Gold Buttons */
        button {
            width: 100%;
            padding: 16px;
            background: var(--gold-main);
            color: var(--deep-green); /* Dark green text on gold looks amazing */
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 15px var(--gold-glow);
        }

        button:hover { 
            background: var(--gold-light); 
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--gold-glow);
        }

        /* Mobile View Adjustments */
        @media (max-width: 768px) {
            .auth-container { 
                flex-direction: column; 
                padding: 30px;
                gap: 30px;
            }
            .brand-header h1 { font-size: 36px; }
            .brand-header .subtitle { font-size: 14px; }
            .brand-header .winning-team { font-size: 12px; }
            .brand-header .winning-team::before,
            .brand-header .winning-team::after { width: 30px; }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        
        <div class="brand-header">
            <h1>Divine Digital Forum</h1>
            <p class="subtitle">We Learn, We Apply, We Build Together</p>
            <p class="winning-team">Be Part Of My Winning Team</p>
        </div>

        <div class="auth-container">
            <div class="auth-section">
                <h2>Welcome Back</h2>
                <form method="POST">
                    {% csrf_token %}
                    {{ login_form.as_p }}
                    <button type="submit" name="login_btn">Sign In</button>
                </form>
            </div>

            <div style="width: 2px; background: linear-gradient(to bottom, transparent, #e5e7eb, transparent);"></div>

            <div class="auth-section">
                <h2>Create Account</h2>
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ user_form.as_p }}
                    {{ profile_form.as_p }}
                    <button type="submit" name="signup_btn">Register</button>
                </form>
            </div>
        </div>

    </div>

</body>
</html>
