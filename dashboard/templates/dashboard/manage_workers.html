{% extends 'main_base.html' %}

{% block content %}

<div style="padding: 30px; font-family: Arial;">

    <h1>Manage Workers</h1>

    <br>

    <a href="{% url 'dashboard:admin_dashboard' %}">
        ← Back to Admin Dashboard
    </a>

    <hr>

    <table border="1" cellpadding="10" cellspacing="0">

        <thead>
            <tr>
                <th>Username</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>

            {% for worker in workers %}

            <tr>

                <td>{{ worker.username }}</td>

                <td>{{ worker.email }}</td>

                <td>

                    <a href="{% url 'dashboard:edit_worker' worker.id %}">
                        Edit
                    </a>

                    |

                    <a href="{% url 'dashboard:delete_worker' worker.id %}">
                        Delete
                    </a>

                </td>

            </tr>

            {% empty %}

            <tr>

                <td colspan="3">
                    No workers found.
                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
