{% extends 'main_base.html' %}

{% block content %}
<div style="padding: 30px; font-family: Arial; max-width: 500px;">
    <h1>Edit Worker Profile</h1>
    <a href="{% url 'dashboard:manage_workers' %}">← Back to Workers List</a>
    <hr>
    
    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <label style="display:block; font-weight:bold;">Username</label>
            <input type="text" name="username" value="{{ worker.username }}" style="width:100%; padding:10px;" readonly>
        </div>
        <div style="margin-bottom: 15px;">
            <label style="display:block; font-weight:bold;">Email Address</label>
            <input type="email" name="email" value="{{ worker.email }}" style="width:100%; padding:10px;" readonly>
        </div>
        <p style="color: #666; font-size: 0.9rem;">Worker permissions can be altered via Django administration portal.</p>
    </form>
</div>
{% endblock %}
