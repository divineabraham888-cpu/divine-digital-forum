<div id="forum-data" 
     style="display: none;"
     data-username="{{ request.user.username }}"
     data-has-worker="{% if selected_worker %}true{% else %}false{% endif %}"
     data-room-name="{% if selected_worker %}{{ selected_worker.id }}{% endif %}">
</div>

<script>
    // 1. Read the data safely from the DOM (VS Code loves this)
    const forumData = document.getElementById('forum-data');
    const currentUsername = forumData.dataset.username;
    const hasWorker = forumData.dataset.hasWorker === 'true';
    
    let jitsiAPI = null;

    function startJitsiCall(roomID, startWithVideoMuted) {
        const videoWrapper = document.getElementById('video-wrapper');
        const chatLog = document.getElementById('chat-log');
        
        videoWrapper.style.display = 'block';
        videoWrapper.innerHTML = ''; 
        if(chatLog) chatLog.style.height = '150px'; 

        const options = {
            roomName: "DivineForum_SecureRoom_" + roomID,
            width: '100%',
            height: '100%',
            parentNode: videoWrapper,
            userInfo: { 
                displayName: currentUsername 
            },
            configOverwrite: { 
                startWithVideoMuted: startWithVideoMuted,
                startWithAudioMuted: false,
                prejoinPageEnabled: false,
                
                // Whiteboard feature
                whiteboard: {
                    enabled: true,
                    collabServerBaseUrl: 'https://board.jitsi.net'
                },

                // All requested buttons
                toolbarButtons: [
                    'microphone',      // Mute/Unmute Audio
                    'camera',          // Turn Off/On Camera
                    'desktop',         // Share Screen button
                    'whiteboard',      // Whiteboard (includes eraser/drawing tools)
                    'chat',            // Built-in Jitsi Chat
                    'raisehand',       // Useful for group calls
                    'participants-pane',// See who is in the call
                    'tileview',        // Grid view
                    'fullscreen',      // Full screen mode
                    'hangup'           // Disjoin / End Call button
                ]
            }
        };
        
        jitsiAPI = new JitsiMeetExternalAPI('meet.jit.si', options);
        
        jitsiAPI.addEventListener('videoConferenceLeft', () => {
            if (jitsiAPI) { 
                jitsiAPI.dispose(); 
                jitsiAPI = null; 
            }
            videoWrapper.style.display = 'none';
            videoWrapper.innerHTML = '';
            if(chatLog) chatLog.style.height = 'auto'; 
        });
    }

    function startGroupCall(groupName) { 
        startJitsiCall(groupName, false); 
    }

    // 2. Only run the worker-specific code if a worker is selected
    if (hasWorker) {
        const roomName = forumData.dataset.roomName;
        
        document.getElementById('btn-audio').addEventListener('click', () => { 
            startJitsiCall("Worker_" + roomName, true); 
        });
        
        document.getElementById('btn-video').addEventListener('click', () => { 
            startJitsiCall("Worker_" + roomName, false); 
        });

        // --- WEBSOCKET CONNECTION ---
        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        const socketUrl = protocol + window.location.host + '/ws/chat/' + roomName + '/';
        const chatSocket = new WebSocket(socketUrl);

        chatSocket.onopen = function(e) {
            console.log("Chat Connected Successfully");
        };

        chatSocket.onclose = function(e) {
            console.error("Chat socket closed unexpectedly.");
        };

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            const chatLog = document.querySelector('#chat-log');
            if (data.type === 'chat_message') {
                chatLog.innerHTML += `
                    <div style="margin-bottom: 15px; text-align: left;">
                        <div style="display: inline-block; padding: 10px 15px; border-radius: 10px; background: white; border: 1px solid #eee;">
                            ${data.message}
                        </div>
                    </div>`;
                chatLog.scrollTop = chatLog.scrollHeight;
            }
        };

        const chatForm = document.querySelector('#chat-form');
        if (chatForm) {
            chatForm.onsubmit = function(e) {
                e.preventDefault();
                const messageInput = document.querySelector('#message-input');
                chatSocket.send(JSON.stringify({ 'type': 'chat_message', 'message': messageInput.value }));
                const chatLog = document.querySelector('#chat-log');
                chatLog.innerHTML += `
                    <div style="margin-bottom: 15px; text-align: right;">
                        <div style="display: inline-block; padding: 10px 15px; border-radius: 10px; background: #D4AF37; color: #0A5C36;">
                            ${messageInput.value}
                        </div>
                    </div>`;
                chatLog.scrollTop = chatLog.scrollHeight;
                messageInput.value = '';
            };
        }
    }
</script>
<script src="https://meet.jit.si/external_api.js"></script>
<div class="mt-4">
    <h4>Need a live session?</h4>
    <p>Jump into the live hub for video calls, screen sharing, and the interactive whiteboard.</p>
    <a href="{% url 'live_room' %}" class="btn btn-success">
        🚀 Launch Live Communication Hub
    </a>
</div>
