{% extends 'base.html' %}

{% block content %}
<div class="h-screen w-full flex flex-col bg-gray-900 text-white overflow-hidden">
    
    <header class="p-4 bg-gray-800 flex justify-between items-center border-b border-gray-700">
        <h1 class="text-xl font-bold">Room: {{ room_name }}</h1>
        <button onclick="hangupCall()" class="bg-red-600 px-4 py-2 rounded-lg hover:bg-red-700 font-semibold">End Call</button>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <div class="flex-1 relative" id="video-container">
            <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-black bg-opacity-70 p-3 rounded-full flex gap-4 backdrop-blur-sm border border-gray-600 z-50">
                <button onclick="api.executeCommand('toggleAudio')" class="p-3 bg-gray-700 rounded-full hover:bg-gray-600 transition">🎙️</button>
                <button onclick="api.executeCommand('toggleVideo')" class="p-3 bg-gray-700 rounded-full hover:bg-gray-600 transition">📹</button>
                <button onclick="api.executeCommand('toggleShareScreen')" class="p-3 bg-blue-600 rounded-full hover:bg-blue-500 transition">🖥️</button>
            </div>
        </div>

        <div class="w-80 bg-gray-800 border-l border-gray-700 flex flex-col">
            <div class="flex p-2 gap-2 border-b border-gray-700">
                <button onclick="switchTab('chat')" class="flex-1 py-1 bg-gray-700 rounded text-sm font-medium">Chat</button>
                <button onclick="switchTab('board')" class="flex-1 py-1 hover:bg-gray-700 rounded text-sm font-medium">Board</button>
            </div>
            
            <div id="side-content" class="flex-1 p-4 overflow-y-auto">
                <p class="text-gray-400 text-center mt-10">Select a tool to begin.</p>
            </div>
        </div>
    </div>
</div>

<script src="https://meet.jit.si/external_api.js"></script>
<script>
    let api;
    const domain = "meet.jit.si";
    const options = {
        roomName: "{{ room_name }}",
        width: "100%",
        height: "100%",
        parentNode: document.querySelector('#video-container'),
        userInfo: { displayName: "{{ user_name }}" },
        // Empty toolbar so our custom buttons are the only ones visible
        interfaceConfigOverwrite: { TOOLBAR_BUTTONS: [] } 
    };

    window.onload = () => {
        api = new JitsiMeetExternalAPI(domain, options);
    };

    // Custom Function to End Call
    function hangupCall() {
        api.dispose();
        window.location.href = "{% url 'dashboard:admin_dashboard' %}";
    }

    // Tab Switching Logic
    function switchTab(tab) {
        const container = document.getElementById('side-content');
        if (tab === 'chat') {
            container.innerHTML = '<p class="text-gray-400">Chat interface loading...</p>';
        } else {
            container.innerHTML = '<p class="text-gray-400">Whiteboard interface loading...</p>';
        }
    }
</script>
{% endblock %}
