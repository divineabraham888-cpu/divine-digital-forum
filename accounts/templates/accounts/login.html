{% extends 'accounts/main_base.html' %}

{% block content %}
<div id="content-main">
    <h2>Login to Divine Digital Forum</h2>
    
    {% if form.errors %}
        <p style="color: red;">Invalid username or password. Please try again.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        
        <!-- This renders your username and password fields automatically -->
        {{ form.as_p }}
        
        <input type="hidden" name="next" value="{{ next }}">
        
        <div class="submit-row">
            <button type="submit">Log in</button>
        </div>
    </form>
</div>
{% endblock %}
